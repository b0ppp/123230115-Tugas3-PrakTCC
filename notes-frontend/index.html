<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Aplikasi Notes</h1>
    
    <form id="noteForm">
        <input type="hidden" id="noteId">
        <input type="text" id="judul" placeholder="Judul Catatan..." required>
        <textarea id="isi" placeholder="Tulis isi catatanmu di sini..." rows="4" required></textarea>
        <button type="submit" id="btnSubmit">Tambah Catatan</button>
        <button type="button" id="btnCancel" class="btn-cancel" onclick="resetForm()">Batal Edit</button>
    </form>

    <div id="notesList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
